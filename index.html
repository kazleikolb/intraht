<!DOCTYPE html>
<html class="light" lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IntraHT | Login</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-variant": "#e5e2e1",
            "outline-variant": "#c4c7c7",
            "on-surface": "#1c1b1b",
            "surface-bright": "#fdf8f8",
            "surface-container": "#f1edec",
            "surface-container-low": "#f7f3f2",
            "secondary": "#5d5f5f",
            "primary": "#000000",
            "background": "#fdf8f8",
            "on-background": "#1c1b1b",
            "outline": "#747878",
            "accent-orange": "#FF6A00",
            "error": "#ba1a1a"
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem"
          },
          spacing: {
            gutter: "16px",
            "section-margin": "32px"
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .bg-architectural {
      background-color: #fdf8f8;
      background-image: radial-gradient(circle at 2px 2px, #e5e2e1 1px, transparent 0);
      background-size: 40px 40px;
    }
  </style>
</head>

<body class="font-sans text-on-background bg-architectural min-h-screen flex flex-col">

  <main class="flex-grow flex items-center justify-center px-gutter py-section-margin relative overflow-hidden">

    <div class="absolute top-6 right-6 z-20 flex items-center gap-2 text-[11px] uppercase tracking-widest font-semibold">
      <button type="button" class="language-btn text-accent-orange" data-lang="de">DE</button>
      <span class="text-outline">|</span>
      <button type="button" class="language-btn text-outline hover:text-primary" data-lang="en">EN</button>
      <span class="text-outline">|</span>
      <button type="button" class="language-btn text-outline hover:text-primary" data-lang="uk">UA</button>
    </div>

    <div class="absolute top-0 right-0 -mr-20 -mt-20 opacity-5 pointer-events-none">
      <div class="w-[800px] h-[800px] bg-black rotate-12"></div>
    </div>

    <section class="w-full max-w-[440px] bg-white border border-outline-variant shadow-[0_4px_20px_rgba(0,0,0,0.04)] p-10 z-10">

      <div class="flex flex-col items-center mb-10">
        <div class="flex items-center gap-2 mb-2">
          <div class="w-8 h-8 bg-primary flex items-center justify-center rounded-sm">
            <span class="material-symbols-outlined text-white text-lg" style="font-variation-settings: 'FILL' 1;">dashboard</span>
          </div>
          <h1 class="text-[20px] leading-7 font-semibold tracking-tighter uppercase">IntraHT</h1>
        </div>
        <p class="text-secondary uppercase tracking-widest text-[10px] font-semibold" data-i18n="subtitle">
          Executive Operations Hub
        </p>
      </div>

      <form id="loginForm" class="space-y-6" autocomplete="on">

        <div id="loginMessage" class="hidden text-sm border px-4 py-3"></div>

        <div class="space-y-2">
          <label class="text-[12px] leading-4 tracking-wide font-semibold text-on-surface uppercase block" for="email" data-i18n="emailLabel">
            E-Mail
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]">mail</span>
            <input
              class="w-full bg-surface-bright border border-outline-variant rounded-DEFAULT py-3 pl-10 pr-4 text-sm focus:ring-0 focus:border-primary transition-all placeholder:text-outline"
              id="email"
              name="email"
              placeholder="name@unternehmen.de"
              type="email"
              required
              autocomplete="email"
            />
          </div>
        </div>

        <div class="space-y-2">
          <div class="flex justify-between items-center">
            <label class="text-[12px] leading-4 tracking-wide font-semibold text-on-surface uppercase block" for="password" data-i18n="passwordLabel">
              Passwort
            </label>
            <a class="text-[12px] leading-4 tracking-wide font-semibold text-accent-orange hover:underline transition-all" href="forgot-password.html" data-i18n="forgotPassword">
              Passwort vergessen?
            </a>
          </div>

          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]">lock</span>
            <input
              class="w-full bg-surface-bright border border-outline-variant rounded-DEFAULT py-3 pl-10 pr-4 text-sm focus:ring-0 focus:border-primary transition-all placeholder:text-outline"
              id="password"
              name="password"
              placeholder="••••••••••••"
              type="password"
              required
              autocomplete="current-password"
            />
          </div>
        </div>

        <div class="flex items-center space-x-2">
          <input
            class="w-4 h-4 text-primary border-outline-variant rounded-sm focus:ring-offset-0 focus:ring-0"
            id="remember"
            name="remember"
            type="checkbox"
          />
          <label class="text-[13px] leading-[18px] text-secondary cursor-pointer select-none" for="remember" data-i18n="remember">
            Eingeloggt bleiben
          </label>
        </div>

        <button
          id="loginButton"
          class="w-full bg-accent-orange text-white text-[12px] leading-4 tracking-widest font-semibold py-4 uppercase hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
          type="submit"
        >
          <span data-i18n="loginButton">Einloggen</span>
          <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        </button>

      </form>

      <div class="mt-8 text-center">
        <p class="text-[13px] leading-[18px] text-outline flex items-center justify-center gap-1">
          <span class="material-symbols-outlined text-[14px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
          <span data-i18n="securePortal">Geschützter interner Zugang</span>
        </p>
      </div>

    </section>

    <div class="absolute bottom-0 left-0 -ml-20 -mb-20 opacity-5 pointer-events-none">
      <div class="w-[600px] h-[600px] bg-black -rotate-12"></div>
    </div>

  </main>

  <footer class="w-full py-8 mt-auto border-t border-zinc-100 bg-zinc-50">
    <div class="flex flex-col md:flex-row justify-between items-center px-8 md:px-12 max-w-[1440px] mx-auto w-full gap-4">
      <p class="text-[11px] uppercase tracking-widest font-medium text-zinc-400">
        © 2026 IntraHT. Internal leadership platform.
      </p>

      <div class="flex flex-wrap justify-center gap-6 md:gap-8">
        <a class="text-[11px] uppercase tracking-widest font-medium text-zinc-400 hover:text-zinc-900 transition-colors" href="#">Datenschutz</a>
        <a class="text-[11px] uppercase tracking-widest font-medium text-zinc-400 hover:text-zinc-900 transition-colors" href="#">Impressum</a>
        <a class="text-[11px] uppercase tracking-widest font-medium text-zinc-400 hover:text-zinc-900 transition-colors" href="#">Support</a>
      </div>
    </div>
  </footer>

  <script>
    const translations = {
      de: {
        subtitle: "Executive Operations Hub",
        emailLabel: "E-Mail",
        passwordLabel: "Passwort",
        forgotPassword: "Passwort vergessen?",
        remember: "Eingeloggt bleiben",
        loginButton: "Einloggen",
        securePortal: "Geschützter interner Zugang",
        missingFields: "Bitte E-Mail und Passwort eingeben.",
        loginFailed: "Login fehlgeschlagen. Bitte Zugangsdaten prüfen.",
        technicalError: "Technischer Fehler. Bitte später erneut versuchen."
      },
      en: {
        subtitle: "Executive Operations Hub",
        emailLabel: "Email",
        passwordLabel: "Password",
        forgotPassword: "Forgot password?",
        remember: "Stay signed in",
        loginButton: "Sign in",
        securePortal: "Protected internal access",
        missingFields: "Please enter email and password.",
        loginFailed: "Login failed. Please check your credentials.",
        technicalError: "Technical error. Please try again later."
      },
      uk: {
        subtitle: "Executive Operations Hub",
        emailLabel: "Електронна пошта",
        passwordLabel: "Пароль",
        forgotPassword: "Забули пароль?",
        remember: "Залишатися в системі",
        loginButton: "Увійти",
        securePortal: "Захищений внутрішній доступ",
        missingFields: "Введіть електронну пошту та пароль.",
        loginFailed: "Не вдалося увійти. Перевірте дані доступу.",
        technicalError: "Технічна помилка. Спробуйте пізніше."
      }
    };

    let currentLang = localStorage.getItem("intrath_lang") || "de";

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("intrath_lang", lang);
      document.documentElement.lang = lang;

      document.querySelectorAll("[data-i18n]").forEach((element) => {
        const key = element.getAttribute("data-i18n");
        if (translations[lang][key]) {
          element.textContent = translations[lang][key];
        }
      });

      document.querySelectorAll(".language-btn").forEach((button) => {
        if (button.dataset.lang === lang) {
          button.classList.remove("text-outline");
          button.classList.add("text-accent-orange");
        } else {
          button.classList.remove("text-accent-orange");
          button.classList.add("text-outline");
        }
      });
    }

    function showMessage(message, type = "error") {
      const box = document.getElementById("loginMessage");
      box.textContent = message;
      box.classList.remove("hidden");

      if (type === "error") {
        box.className = "text-sm border px-4 py-3 border-red-200 bg-red-50 text-red-700";
      } else {
        box.className = "text-sm border px-4 py-3 border-green-200 bg-green-50 text-green-700";
      }
    }

    document.querySelectorAll(".language-btn").forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.lang));
    });

    document.getElementById("loginForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const remember = document.getElementById("remember").checked;
      const button = document.getElementById("loginButton");

      if (!email || !password) {
        showMessage(translations[currentLang].missingFields);
        return;
      }

      button.disabled = true;
      button.classList.add("opacity-70", "cursor-not-allowed");

      try {
        const response = await fetch("api/login.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            email,
            password,
            remember,
            language: currentLang
          })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          window.location.href = result.redirect || "dashboard.html";
          return;
        }

        showMessage(result.message || translations[currentLang].loginFailed);
      } catch (error) {
        showMessage(translations[currentLang].technicalError);
      } finally {
        button.disabled = false;
        button.classList.remove("opacity-70", "cursor-not-allowed");
      }
    });

    setLanguage(currentLang);
  </script>

</body>
</html>
